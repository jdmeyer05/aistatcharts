# Cloud Build config for the FastAPI-only image.
#
# Used by:
#  - Manual: gcloud builds submit --config=cloudbuild.api.yaml .
#  - Cloud Build trigger on ^main$ (auto-deploys to Cloud Run on every push)

substitutions:
  _IMAGE: "us-east1-docker.pkg.dev/aistatcharts/cloud-run-source-deploy/aistatcharts-api"
  _SERVICE: "aistatcharts-api"
  _REGION: "us-east1"
  # _TAG defaults to "latest" for manual `gcloud builds submit` (no git context).
  # Trigger on main overrides with _TAG=$SHORT_SHA for revision traceability.
  _TAG: "latest"

steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-f"
      - "Dockerfile.api"
      - "-t"
      - "${_IMAGE}:latest"
      - "-t"
      - "${_IMAGE}:${_TAG}"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "--all-tags", "${_IMAGE}"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "${_SERVICE}"
      - "--image=${_IMAGE}:${_TAG}"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--quiet"

images:
  - "${_IMAGE}:latest"
  - "${_IMAGE}:${_TAG}"

options:
  machineType: E2_HIGHCPU_8
  # Required when the trigger overrides serviceAccount (the user-provided SA
  # case requires explicit logging destination — Cloud Logging is the default
  # used by the existing Streamlit trigger).
  logging: CLOUD_LOGGING_ONLY
