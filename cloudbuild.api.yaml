# Cloud Build config for the FastAPI-only image.
#
# Usage:
#   gcloud builds submit --config=cloudbuild.api.yaml \
#     --substitutions=_IMAGE=us-east1-docker.pkg.dev/PROJECT/cloud-run-source-deploy/aistatcharts-api:latest .

substitutions:
  _IMAGE: "us-east1-docker.pkg.dev/aistatcharts/cloud-run-source-deploy/aistatcharts-api:latest"

steps:
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-f", "Dockerfile.api", "-t", "${_IMAGE}", "."]

images:
  - "${_IMAGE}"

options:
  machineType: E2_HIGHCPU_8
