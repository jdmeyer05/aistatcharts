name: Hourly Worker

on:
  schedule:
    # Market hours (Mon-Fri 9am-5pm ET = 13:00-21:00 UTC): every hour
    - cron: '5 13-21 * * 1-5'
    # Off-hours (Mon-Fri before/after market): every 4 hours
    - cron: '5 1,5,9 * * 1-5'
    # Weekends: every 4 hours (conflict doesn't stop on weekends)
    - cron: '5 1,5,9,13,17,21 * * 0,6'
  workflow_dispatch:
    inputs:
      task:
        description: 'Task to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - conflict
          - briefing
          - timeline
          - metrics
          - cleanup

jobs:
  run-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install supabase openai anthropic google-genai requests toml

      - name: Run worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
        run: |
          python worker.py --task ${{ github.event.inputs.task || 'all' }}
